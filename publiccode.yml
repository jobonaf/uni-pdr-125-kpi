description:
  it:
    genericName: Applicazione di gestione KPI
    localisedName: Strumento KPI UNI/PdR 125:2022 — Parità di Genere
    shortDescription: Strumento web per il monitoraggio e la reportistica dei KPI
      per UNI/PdR 125:2022 sulla parità di genere nelle organizzazioni pubbliche
      e private.
    longDescription: >
      L'applicazione supporta le organizzazioni pubbliche e private nel percorso

      di certificazione della parità di genere ai sensi della UNI/PdR 125:2022.


      È installabile ed eseguibile su ambienti Linux e Windows, oltre che
      fruibile

      via web.


      Deploy pubblico disponibile su:

      https://uni-pdr-125-kpi.streamlit.app/


      L'applicazione non archivia dati, non trasmette informazioni a server

      remoti e non tratta dati personali.


      Funzionalità principali:


      - Compilazione guidata dei KPI nelle 6 aree della norma

      - Calcolo automatico dello score (soglia 60%)

      - Dashboard interattiva (radar, bar chart)

      - Confronto storico multi-annualità

      - Report esportabile (PDF)

      - Import/export JSON
