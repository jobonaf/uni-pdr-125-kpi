description:
  it:
    genericName: Applicazione di gestione KPI
    localisedName: Strumento KPI UNI/PdR 125:2022 — Parità di Genere
    shortDescription: Strumento web per il monitoraggio e la reportistica dei KPI
      per UNI/PdR 125:2022 sulla parità di genere nelle organizzazioni pubbliche
      e private.
    longDescription: >
      L'applicazione supporta le organizzazioni pubbliche e private nel percorso
      di certificazione della parità di genere ai sensi della UNI/PdR 125:2022,
      emanata da UNI su incarico del Dipartimento per le Pari Opportunità
      nell'ambito del PNRR (Missione 5).


      Funzionalità principali:

      - Anagrafica organizzazione con classificazione per fascia dimensionale
        (Micro/Piccola/Media/Grande, tassonomia ISTAT) e settore ATECO.

      - Benchmark di settore estratti dall'Appendice B della norma con link
        alle fonti ufficiali aggiornate (ISTAT, INPS, Consob, Eurostat).

      - Compilazione guidata dei KPI suddivisi nelle 6 aree della norma
        (Cultura e Strategia, Governance, Processi HR, Opportunità di Crescita,
        Equità Remunerativa, Tutela Genitorialità), con descrizione estesa
        per ogni indicatore e verifica automatica dei KPI "necessari" per fascia.

      - Calcolo automatico dello score globale ponderato con verifica della
        soglia di certificazione (60%) e dei requisiti obbligatori per fascia.

      - Dashboard con radar chart, bar chart per area, distribuzione risposte
        e tabella di riepilogo.

      - Confronto storico multi-annualità con line chart e tabella comparativa.

      - Report di valutazione stampabile / esportabile in PDF con elenco
        dei gap e delle priorità di intervento.

      - Import/Export dati in formato JSON aperto per la persistenza e la
        condivisione tra sessioni e operatori.


      Riferimenti normativi:

      - UNI/PdR 125:2022 (ICS 03.100.01)

      - D.Lgs. 11 aprile 2006 n.198 (Codice delle pari opportunità)

      - L. 5 novembre 2021 n.162 (parità salariale)

      - Agenda ONU 2030, Obiettivo 5 (uguaglianza di genere)

      - Strategia Nazionale sulla Parità di Genere 2021–2025
    documentation: https://github.com/jobonaf/uni-pdr-125-kpi/blob/main/README.md
